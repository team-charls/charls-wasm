name: Build and test
permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 5.0.4
          actions-cache-folder: 'emsdk-cache'

      - name: Verify Emscripten
        run: emcc --version

      - name: Build with CMake
        run: |
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release -DCHARLS_PEDANTIC_WARNINGS=On -DCHARLS_TREAT_WARNING_AS_ERROR=On
          emmake make -C build

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
